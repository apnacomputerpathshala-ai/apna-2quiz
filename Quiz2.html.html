<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna Computer Pathshala - Mega Test</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1a237e; --accent: #ffd600; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; text-align: center; }
        
        .header-section { background: var(--primary); color: white; padding: 30px 10px 25px; border-bottom: 5px solid var(--accent); }
        .logo-circle { height: 80px; width: 80px; background-image: url('https://cdn-icons-png.flaticon.com/512/3067/3067451.png'); background-size: 70%; background-position: center; background-repeat: no-repeat; border-radius: 50%; margin: 0 auto 15px; border: 3px solid white; background-color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { max-width: 500px; margin: -20px auto 30px; background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); position: relative; z-index: 10; text-align: left; }
        
        input { width: 92%; padding: 15px; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; margin-bottom: 20px; }
        .btn { width: 100%; background: var(--primary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 17px; }
        
        .option { display: block; padding: 15px; margin: 12px 0; border: 1.5px solid #eee; border-radius: 12px; cursor: pointer; background: #fff; }
        .option.selected { background: #f0f2ff; border-color: var(--primary); font-weight: bold; }
        
        /* Palette Styling */
        .p-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .p-btn { width: 35px; height: 35px; border: 1px solid #ccc; background: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .p-btn.done { background: #4caf50; color: white; border: none; } /* Answered */
        .p-btn.skipped { background: #f44336; color: white; border: none; } /* Visited but Not Answered */
        .p-btn.active { border: 2px solid var(--primary); box-shadow: 0 0 5px var(--primary); }

        .ans-item { padding: 15px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .correct { color: green; font-weight: bold; }
        .wrong { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="logo-circle"></div>
    <h1>APNA COMPUTER PATHSHALA</h1>
    <p>Mega Mock Test: 25 Questions</p>
</div>

<div class="container" id="box">
    <div id="intro" style="text-align: center;">
        <h2 style="color: var(--primary);">स्वागत है!</h2>
        <div style="background: #fff9c4; padding: 15px; border-radius: 10px; border-left: 5px solid #fbc02d; margin-bottom: 20px; font-size: 14px; text-align: left;">
            <b>📝 निर्देश:</b><br>
            • समय: <b>15 मिनट</b> | प्रश्न: <b>25</b><br>
            • <span style="color:red;">लाल रंग:</span> स्किप किया गया सवाल<br>
            • <span style="color:green;">हरा रंग:</span> हल किया गया सवाल
        </div>
        <input type="text" id="s-name" placeholder="अपना नाम यहाँ लिखें">
        <button class="btn" onclick="start()">स्टार्ट टेस्ट</button>
    </div>

    <div id="quiz" style="display:none;">
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px;">
            <span id="q-count">सवाल 1/25</span>
            <span id="timer" style="color:red;">⏱ 15:00</span>
        </div>
        <p id="q-text" style="font-size:18px; font-weight:600;"></p>
        <div id="options-div"></div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn" style="background:#e0e0e0; color:#333; flex:1;" onclick="prev()">Previous</button>
            <button class="btn" style="flex:1;" onclick="next()">Save & Next</button>
        </div>
        <div style="margin-top:30px; padding:15px; background:#f9f9f9; border-radius:10px;">
            <p style="font-weight:bold; margin:0; color:#666; font-size:12px;">QUESTION PALETTE</p>
            <div class="p-grid" id="palette"></div>
            <button class="btn" style="background:#d32f2f; margin-top:20px;" onclick="finish()">Final Submit</button>
        </div>
    </div>

    <div id="result-box" style="display:none; text-align: center;">
        <h2 style="color:#4caf50;">टेस्ट सबमिट हो गया! ✅</h2>
        <div id="score-display" style="font-size:35px; font-weight:bold; color:var(--primary); margin:15px 0;"></div>
        <p id="time-taken-display" style="font-weight:bold;"></p>
        <button class="btn" style="background:#4caf50; margin-bottom:10px;" onclick="showAnswers()">Check Answer Key</button>
        <button class="btn" style="background:#333;" onclick="location.reload()">दोबारा टेस्ट दें</button>
        <div id="answer-key" style="display:none; margin-top:20px; text-align: left; max-height: 300px; overflow-y: auto;"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://apnapathshala-73-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const questions = [
        { q: "Plain, Unformatted Text लिखने के लिए कौन सा Software Tool सबसे उपयुक्त है?", a: ["Wordpad", "Notepad", "Paint", "Excel"], c: 1 },
        { q: "इनमें से कौन सा Tool Bold और Italics Formatting की सुविधा देता है?", a: ["Paint", "Notepad", "Wordpad", "Cmd"], c: 2 },
        { q: "MS Paint का मुख्य उद्देश्य क्या है?", a: ["कोड लिखना", "चित्र बनाना और रंग भरना", "ईमेल भेजना", "दस्तावेज़ बनाना"], c: 1 },
        { q: "इनमें से कौन सा Windows का Built-In Application नहीं है?", a: ["Notepad", "Wordpad", "Paint", "Photoshop"], c: 3 },
        { q: "Command Prompt में नया Folder बनाने के लिए कौन सा Command उपयोग होता है?", a: ["cd", "dir", "md", "del"], c: 2 },
        { q: "Notepad से Save की गई फाइल का Extension क्या होता है?", a: [".docx", ".rtf", ".txt", ".png"], c: 2 },
        { q: "Paint में किसी क्षेत्र में रंग भरने के लिए कौन सा टूल उपयोग होता है?", a: ["Pencil", "Fill", "Eraser", "Select"], c: 1 },
        { q: "CMD में Dir Command का क्या कार्य है?", a: ["फाइल Delete करना", "फाइल और फोल्डर दिखाना", "फोल्डर का नाम बदलना", "विंडो बंद करना"], c: 1 },
        { q: "Text में Headings और रंग जोड़ने के लिए कौन सा Software सबसे अच्छा है?", a: ["Notepad", "Wordpad", "Paint", "CMD"], c: 1 },
        { q: "Windows में किसी फाइल या फोल्डर को खोलने के लिए कौन सी क्रिया की जाती है?", a: ["Right-Click", "Single-Click", "Double-Click", "Drag And Drop"], c: 2 },
        { q: "Notepad में टेक्स्ट की फॉर्मेटिंग (जैसे Bold/Italic) करने की सुविधा होती है?", a: ["हाँ", "नहीं", "सिर्फ Bold", "सिर्फ Italic"], c: 1 },
        { q: "Wordpad का इस्तेमाल किस प्रकार के डॉक्यूमेंट बनाने के लिए किया जाता है?", a: ["Complex Programming", "Basic Documents", "Heavy Graphics", "Video Editing"], c: 1 },
        { q: "Paint में 'Freehand Drawing' करने के लिए किस टूल का उपयोग होता है?", a: ["Shapes", "Pencil/Brush", "Text Tool", "Fill Tool"], c: 1 },
        { q: "CMD का पूरा नाम (Full Form) क्या है?", a: ["Common Mode", "Command Prompt", "Computer Main Data", "Control Mode"], c: 1 },
        { q: "Paint में चित्र का आकार (Size) बदलने के लिए किस विकल्प का उपयोग करते हैं?", a: ["Resize & Skew", "Undo", "Cut", "Paste"], c: 0 },
        { q: "गलती सुधारने या पिछले स्टेप पर वापस जाने के लिए कौन सा बटन दबाते हैं?", a: ["Redo", "Undo", "Save", "Exit"], c: 1 },
        { q: "Wordpad फाइल का एक्सटेंशन (Extension) क्या हो सकता है?", a: [".txt", ".rtf या .docx", ".mp3", ".jpg"], c: 1 },
        { q: "इनमें से कौन सा एक 'Text-Based Interface' है?", a: ["Notepad", "Paint", "Command Prompt (CMD)", "Wordpad"], c: 2 },
        { q: "Paint में 'Text Tool' का आइकॉन कैसा दिखता है?", a: ["A", "B", "T", "P"], c: 0 },
        { q: "किसी फाइल को हटाने (Delete) के लिए CMD में कौन सा कमांड देते हैं?", a: ["md", "cd", "del", "dir"], c: 2 },
        { q: "Paint में परफेक्ट सर्कल (Circle) बनाने के लिए किस बटन को दबाकर रखना चाहिए?", a: ["Ctrl", "Alt", "Shift", "Enter"], c: 2 },
        { q: "CMD में 'cd' कमांड का क्या अर्थ है?", a: ["Create Data", "Change Directory", "Copy Document", "Clear Display"], c: 1 },
        { q: "Paint के 'Select Tool' का क्या उपयोग है?", a: ["रंग भरना", "चित्र का हिस्सा चुनना या मूव करना", "टेक्स्ट लिखना", "मिटाना"], c: 1 },
        { q: "क्या CMD से सिस्टम-लेवल के काम और फाइल नेविगेशन किए जा सकते हैं?", a: ["हाँ", "नहीं", "पता नहीं", "सिर्फ गेम खेल सकते हैं"], c: 0 },
        { q: "इनमें से कौन सा टूल चित्र का भाग मिटाने के लिए उपयोग होता है?", a: ["Fill", "Eraser", "Brush", "Pencil"], c: 1 }
    ];

    let curr = 0, name = "", answers = new Array(questions.length).fill(null), visited = new Array(questions.length).fill(false);
    let timeLeft = 900, startTime = null, quizDate = new Date().toISOString().split('T')[0];

    function start() {
        name = document.getElementById('s-name').value;
        if(!name) return alert("नाम लिखें!");
        startTime = Date.now();
        document.getElementById('intro').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        showQ();
        setInterval(() => {
            if(timeLeft <= 0) return;
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `⏱ ${m}:${s<10?'0':''}${s}`;
            if(timeLeft === 0) finish(true);
        }, 1000);
    }

    function showQ() {
        visited[curr] = true; // सवाल देख लिया गया
        const q = questions[curr];
        document.getElementById('q-text').innerText = `${curr+1}. ${q.q}`;
        document.getElementById('q-count').innerText = `सवाल ${curr+1}/${questions.length}`;
        const div = document.getElementById('options-div');
        div.innerHTML = '';
        q.a.forEach((o, i) => {
            const optDiv = document.createElement('div');
            optDiv.className = `option ${answers[curr] === i ? 'selected' : ''}`;
            optDiv.innerText = o;
            optDiv.onclick = () => { answers[curr] = i; showQ(); };
            div.appendChild(optDiv);
        });
        updatePalette();
    }

    function next() { if(curr < questions.length - 1) { curr++; showQ(); } }
    function prev() { if(curr > 0) { curr--; showQ(); } }

    function updatePalette() {
        const p = document.getElementById('palette');
        p.innerHTML = "";
        questions.forEach((_, i) => {
            let statusClass = "";
            if(answers[i] !== null) statusClass = "done"; // Answered (Green)
            else if(visited[i]) statusClass = "skipped"; // Visited but skipped (Red)
            
            p.innerHTML += `<button class="p-btn ${statusClass} ${i===curr?'active':''}" onclick="curr=${i};showQ()">${i+1}</button>`;
        });
    }

    function finish(auto = false) {
        if(!auto && !confirm("क्या आप टेस्ट सबमिट करना चाहते हैं?")) return;
        let score = 0;
        answers.forEach((ans, i) => { if(ans === questions[i].c) score++; });
        
        const durationMs = Date.now() - startTime;
        const mins = Math.floor(durationMs / 60000), secs = Math.floor((durationMs % 60000) / 1000);
        
        db.ref(`quizzes/${quizDate}/${name}`).set({ name, score, timestamp: Date.now(), startTime: startTime });
        
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score-display').innerText = `स्कोर: ${score} / ${questions.length}`;
        document.getElementById('time-taken-display').innerText = `समय लगा: ${mins} मि ${secs} से`;
    }

    function showAnswers() {
        const keyBox = document.getElementById('answer-key');
        keyBox.innerHTML = "<h3>Answer Key:</h3>";
        questions.forEach((q, i) => {
            const isCorrect = answers[i] === q.c;
            keyBox.innerHTML += `<div class="ans-item"><b>Q${i+1}: ${q.q}</b><br>जवाब: <span class="${isCorrect?'correct':'wrong'}">${answers[i]!==null?q.a[answers[i]]:'N/A'}</span> | सही: <span class="correct">${q.a[q.c]}</span></div>`;
        });
        keyBox.style.display = 'block';
    }
</script>
</body>
</html>
